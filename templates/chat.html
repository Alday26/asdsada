<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat about {{ product.name }} | Wavix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --deep-space: #0a0a0a;
            --cosmic-purple: #1a0a2e;
            --neon-purple: #9333ea;
            --electric-purple: #a855f7;
            --glow-purple: #c084fc;
            --starlight: #ffffff;
            --moonlight: #e9d5ff;
            --nebula: #d8b4fe;
            --void: #000000;
            --accent-glow: #e879f9;
        }

        body {
            background: radial-gradient(circle at top, var(--cosmic-purple), var(--deep-space));
            color: var(--starlight);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(192, 132, 252, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(147, 51, 234, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(147, 51, 234, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .chat-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(138, 43, 226, 0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(147, 51, 234, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--neon-purple), var(--electric-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transform: rotate(15deg);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: rotate(15deg) scale(1); box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
            50% { transform: rotate(15deg) scale(1.05); box-shadow: 0 0 30px rgba(168, 85, 247, 0.8); }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--electric-purple), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .page-title {
            color: var(--starlight);
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, var(--electric-purple), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .page-subtitle {
            color: var(--moonlight);
            font-size: 1rem;
            text-align: center;
            margin-top: 8px;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(138, 43, 226, 0.2);
        }

        .product-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            border: 2px solid rgba(147, 51, 234, 0.3);
            object-fit: cover;
        }

        .product-details {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            color: var(--starlight);
            font-size: 1.1rem;
        }

        .product-price {
            color: var(--electric-purple);
            font-weight: 600;
            margin-top: 5px;
        }

        /* Chat Messages */
        .chat-container {
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 16px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--electric-purple);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            max-width: 80%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sent {
            background: linear-gradient(135deg, var(--neon-purple), var(--electric-purple));
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .received {
            background: rgba(255, 255, 255, 0.1);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(138, 43, 226, 0.2);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .sender-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .sent .sender-name {
            color: var(--starlight);
        }

        .received .sender-name {
            color: var(--glow-purple);
        }

        .message-time {
            font-size: 0.8rem;
            color: var(--moonlight);
            opacity: 0.8;
        }

        .message-content {
            color: var(--starlight);
            line-height: 1.4;
            word-wrap: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--nebula);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        /* Message Form */
        .message-form {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(138, 43, 226, 0.3);
            border-radius: 12px;
            color: var(--starlight);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }

        .message-input:focus {
            border-color: var(--electric-purple);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .message-input::placeholder {
            color: var(--nebula);
        }

        .send-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, var(--neon-purple), var(--electric-purple));
            color: var(--starlight);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            align-self: flex-end;
            height: 60px;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--starlight);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.2);
        }

        .actions-container {
            display: flex;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .chat-card {
                padding: 25px;
            }
            
            .chat-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .message-form {
                flex-direction: column;
            }
            
            .send-btn {
                align-self: stretch;
                justify-content: center;
            }
            
            .page-title {
                font-size: 24px;
            }
            
            .logo-text {
                font-size: 1.6rem;
            }

            .message {
                max-width: 90%;
            }
        }

        @media (max-width: 480px) {
            .chat-card {
                padding: 20px;
            }

            .page-title {
                font-size: 22px;
            }

            .logo-text {
                font-size: 1.4rem;
            }

            .chat-container {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <div class="chat-card">
            <!-- Header -->
            <div class="chat-header">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="logo-text">WAVIX</div>
                </div>
                <div>
                    <h1 class="page-title">Product Chat</h1>
                    <p class="page-subtitle">Discuss {{ product.name }} with the seller</p>
                </div>
            </div>

            <!-- Product Info -->
            <div class="product-info">
                <img src="{{ product.image_url or 'https://via.placeholder.com/60/1a0a2e/a855f7?text=Product' }}" 
                     alt="{{ product.name }}" 
                     class="product-image">
                <div class="product-details">
                    <div class="product-name">{{ product.name }}</div>
                    <div class="product-price">${{ product.price }}</div>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-container" id="chat-messages">
                {% for msg in messages %}
                    <div class="message {% if msg.sender_id == session.user_id %}sent{% else %}received{% endif %}">
                        <div class="message-header">
                            <span class="sender-name">{{ msg.sender_name }}</span>
                            <span class="message-time">{{ msg.created_at }}</span>
                        </div>
                        <div class="message-content">{{ msg.message }}</div>
                    </div>
                {% else %}
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <p>No messages yet. Start the conversation!</p>
                    </div>
                {% endfor %}
            </div>

            <!-- Message Form -->
            <form method="POST" class="message-form">
                <textarea name="message" placeholder="Type your message..." class="message-input" required></textarea>
                <button type="submit" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                    Send
                </button>
            </form>

            <!-- Back Button -->
            <div class="actions-container">
                <a href="{{ url_for('index') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // Auto-scroll to bottom of chat
        document.addEventListener('DOMContentLoaded', function() {
            const chatContainer = document.getElementById('chat-messages');
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Add animation to messages
            const messages = document.querySelectorAll('.message');
            messages.forEach((message, index) => {
                message.style.animationDelay = `${index * 0.1}s`;
            });
        });

        // Auto-refresh messages every 5 seconds
        setInterval(function() {
            // In a real application, you would fetch new messages via AJAX
            // For this example, we'll just reload the page
            // window.location.reload();
        }, 5000);
    </script>
</body>
</html>
