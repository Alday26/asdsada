<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Rider Account | Wavix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --deep-space: #0a0a0a;
            --cosmic-purple: #1a0a2e;
            --neon-purple: #9333ea;
            --electric-purple: #a855f7;
            --glow-purple: #c084fc;
            --starlight: #ffffff;
            --moonlight: #e9d5ff;
            --nebula: #d8b4fe;
            --void: #000000;
            --accent-glow: #e879f9;
            --success: #4ade80;
        }

        body {
            background: radial-gradient(circle at top, var(--cosmic-purple), var(--deep-space));
            color: var(--starlight);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(192, 132, 252, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(147, 51, 234, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(147, 51, 234, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .create-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(138, 43, 226, 0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .create-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(147, 51, 234, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--neon-purple), var(--electric-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transform: rotate(15deg);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: rotate(15deg) scale(1); box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
            50% { transform: rotate(15deg) scale(1.05); box-shadow: 0 0 30px rgba(168, 85, 247, 0.8); }
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--electric-purple), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .page-title {
            color: var(--starlight);
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, var(--electric-purple), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .page-subtitle {
            color: var(--moonlight);
            font-size: 1rem;
            text-align: center;
            margin-top: 8px;
        }

        /* Form Styles */
        .create-form {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--moonlight);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .required::after {
            content: '*';
            color: var(--electric-purple);
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(138, 43, 226, 0.3);
            border-radius: 10px;
            color: var(--starlight);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--electric-purple);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .form-input::placeholder {
            color: var(--nebula);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--nebula);
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: var(--starlight);
        }

        .form-help {
            font-size: 0.85rem;
            color: var(--nebula);
            margin-top: 5px;
            font-style: italic;
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak {
            background: #ef4444;
            width: 33%;
        }

        .strength-medium {
            background: #f59e0b;
            width: 66%;
        }

        .strength-strong {
            background: #10b981;
            width: 100%;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            color: var(--nebula);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px 25px;
            background: linear-gradient(135deg, var(--neon-purple), var(--electric-purple));
            color: var(--starlight);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--starlight);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.2);
        }

        .actions-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .create-card {
                padding: 25px;
            }
            
            .create-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .page-title {
                font-size: 24px;
            }
            
            .logo-text {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .create-card {
                padding: 20px;
            }

            .page-title {
                font-size: 22px;
            }

            .logo-text {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <div class="create-card">
            <!-- Header -->
            <div class="create-header">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <div class="logo-text">WAVIX</div>
                </div>
                <div>
                    <h1 class="page-title">Create Rider Account</h1>
                    <p class="page-subtitle">Add a new rider to the platform</p>
                </div>
            </div>

            <!-- Create Form -->
            <form method="POST" class="create-form">
                <div class="form-group">
                    <label class="form-label required">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" name="username" class="form-input" placeholder="Enter rider username" required>
                    <div class="form-help">Choose a unique username for the rider</div>
                </div>

                <div class="form-group">
                    <label class="form-label required">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-container">
                        <input type="password" name="password" id="password" class="form-input" placeholder="Enter secure password" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="password-strength-bar"></div>
                    </div>
                    <div class="strength-text" id="password-strength-text">Password strength</div>
                    <div class="form-help">Use at least 8 characters with letters and numbers</div>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-user-plus"></i>
                    Create Rider Account
                </button>
            </form>

            <!-- Back Button -->
            <div class="actions-container">
                <a href="{{ url_for('admin_dashboard') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Admin Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'fas fa-eye';
            }
        }

        // Password strength indicator
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('password-strength-bar');
            const strengthText = document.getElementById('password-strength-text');
            
            // Reset
            strengthBar.className = 'strength-bar';
            strengthBar.style.width = '0%';
            
            if (password.length === 0) {
                strengthText.textContent = 'Password strength';
                strengthText.style.color = 'var(--nebula)';
                return;
            }
            
            // Calculate strength
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength += 1;
            if (password.length >= 12) strength += 1;
            
            // Character variety checks
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
            
            // Update UI
            if (strength <= 2) {
                strengthBar.className = 'strength-bar strength-weak';
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#ef4444';
            } else if (strength <= 4) {
                strengthBar.className = 'strength-bar strength-medium';
                strengthText.textContent = 'Medium password';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthBar.className = 'strength-bar strength-strong';
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#10b981';
            }
        });

        // Form validation
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            
            form.addEventListener('submit', function(e) {
                const username = form.querySelector('input[name="username"]');
                const password = form.querySelector('input[name="password"]');
                let isValid = true;
                
                // Username validation
                if (username.value.trim().length < 3) {
                    isValid = false;
                    username.style.borderColor = '#ef4444';
                    alert('Username must be at least 3 characters long.');
                }
                
                // Password validation
                if (password.value.length < 8) {
                    isValid = false;
                    password.style.borderColor = '#ef4444';
                    alert('Password must be at least 8 characters long.');
                }
                
                if (!isValid) {
                    e.preventDefault();
                }
            });
            
            // Clear error styles on input
            const inputs = form.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    this.style.borderColor = '';
                });
            });
        });
    </script>
</body>
</html>
